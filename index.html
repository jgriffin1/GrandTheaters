<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unga Bunga Movie Page</title>

<style>
:root {
    --bg1: #ff9a9e;
    --bg2: #fad0c4;
    --text-color: black;
}

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Comic Sans MS, cursive, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(270deg, var(--bg1), var(--bg2), cyan, magenta, yellow);
    background-size: 1000% 1000%;
    animation: rainbowBG 12s ease infinite;
    color: var(--text-color);
}

@keyframes rainbowBG {
    0% { background-position: 0% 50% }
    50% { background-position: 100% 50% }
    100% { background-position: 0% 50% }
}

/* TEXT */
.main-text {
    font-size: 3em;
    animation: wobble 1s infinite alternate;
}

@keyframes wobble {
    from { transform: rotate(-2deg); }
    to { transform: rotate(2deg); }
}

.sub-text {
    font-size: 1.5em;
    margin: 20px;
}

/* TOGGLE */
.switch {
    width: 120px;
    height: 60px;
    position: relative;
    z-index: 10;
}

.switch input { display: none; }

.slider {
    position: absolute;
    inset: 0;
    background: black;
    border-radius: 60px;
    cursor: pointer;
}

.slider::before {
    content: "🌞";
    position: absolute;
    height: 50px;
    width: 50px;
    left: 5px;
    top: 5px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.4s;
}

input:checked + .slider::before {
    transform: translateX(60px) rotate(360deg);
    content: "🌙";
}

/* DVD */
#dvd {
    position: absolute;
    width: 120px;
    height: 60px;
    font-weight: bold;
    font-size: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
    pointer-events: none;
    mix-blend-mode: difference;
}

/* TRAIL */
.trail {
    position: absolute;
    width: 120px;
    height: 60px;
    border-radius: 10px;
    opacity: 0.4;
    pointer-events: none;
    animation: fadeTrail 1s linear forwards;
}

@keyframes fadeTrail {
    to { opacity: 0; transform: scale(0.8); }
}

/* EXPLOSION */
.explosion {
    position: absolute;
    font-size: 2rem;
    animation: boom 1s ease-out forwards;
}

@keyframes boom {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(3); opacity: 0; }
}

</style>
</head>

<body>

<div class="main-text">UNGA BUNGA IT MOOVEE TIME</div>

<div class="sub-text">
    call Trevor at 
    <a href="https://youtu.be/dQw4w9WgXcQ?si=M_oTXja0paKxcQOz" target="_blank">
        Click to Reveal Phone Number
    </a>
</div>

<label class="switch">
    <input type="checkbox" id="themeToggle">
    <span class="slider"></span>
</label>

<div id="dvd">DVD</div>

<script>
const toggle = document.getElementById('themeToggle');

/* 🎨 THEME */
function setTheme(isDark) {
    if (isDark) {
        document.documentElement.style.setProperty('--bg1', '#0f2027');
        document.documentElement.style.setProperty('--bg2', '#203a43');
        document.documentElement.style.setProperty('--text-color', 'white');
    } else {
        document.documentElement.style.setProperty('--bg1', '#ff9a9e');
        document.documentElement.style.setProperty('--bg2', '#fad0c4');
        document.documentElement.style.setProperty('--text-color', 'black');
    }
}

const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
setTheme(prefersDark.matches);
toggle.checked = prefersDark.matches;

toggle.addEventListener('change', () => {
    setTheme(toggle.checked);
});

prefersDark.addEventListener('change', (e) => {
    setTheme(e.matches);
    toggle.checked = e.matches;
});

/* DVD */
const dvd = document.getElementById('dvd');

let x = 100, y = 100;
let dx = 2, dy = 2;
let speedMultiplier = 1;

function randomColor(dark) {
    return dark
        ? `hsl(${Math.random()*360}, 80%, 40%)`
        : `hsl(${Math.random()*360}, 100%, 60%)`;
}

dvd.style.background = randomColor(toggle.checked);

function createTrail() {
    const t = document.createElement('div');
    t.className = 'trail';
    t.style.left = x + 'px';
    t.style.top = y + 'px';
    t.style.background = randomColor(toggle.checked);
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1000);
}

function explode(x, y) {
    for (let i = 0; i < 20; i++) {
        const e = document.createElement('div');
        e.className = 'explosion';
        e.innerText = ['💥','✨','🔥','🎉'][Math.floor(Math.random()*4)];
        e.style.left = x + 'px';
        e.style.top = y + 'px';
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 1000);
    }
}

function animateDVD() {
    const width = window.innerWidth - dvd.offsetWidth;
    const height = window.innerHeight - dvd.offsetHeight;

    x += dx * speedMultiplier;
    y += dy * speedMultiplier;

    let hitX = false;
    let hitY = false;

    if (x <= 0 || x >= width) {
        dx *= -1;
        hitX = true;
    }

    if (y <= 0 || y >= height) {
        dy *= -1;
        hitY = true;
    }

    // 🎯 PERFECT CORNER HIT
    if (hitX && hitY) {
        if (Math.random() < 0.3) { // rare-ish
            explode(x, y);
        }
    }

    if (hitX || hitY) {
        dvd.style.background = randomColor(toggle.checked);
    }

    dvd.style.left = x + 'px';
    dvd.style.top = y + 'px';

    createTrail();

    // ⚡ SPEED UP OVER TIME
    speedMultiplier += 0.0005;

    requestAnimationFrame(animateDVD);
}

animateDVD();

</script>

</body>
</html>
